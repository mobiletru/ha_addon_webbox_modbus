name: WebBox Modbus Dashboard
version: "1.0.0"
slug: webbox_modbus
description: Sunny WebBox dashboard with JSON-RPC and Modbus TCP for Sunny Island 6048 monitoring and parameter control.
url: https://github.com/mobiletru/ha_addon_webbox_modbus
arch:
  - aarch64
  - amd64
init: false
boot: auto
startup: application
hassio_api: true
homeassistant_api: false
host_network: false
ingress: true
ingress_port: 8099
panel_icon: mdi:chart-timeline-variant
panel_title: WebBox Modbus
watchdog: "http://[HOST]:[PORT:8099]/api/health"
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Dashboard (only needed when not using Ingress)
map:
  - share:rw
  - config:rw
options:
  log_level: info
  scan_subnet: ""
  cloudflare_tunnel_token: ""
  webboxes: []
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  scan_subnet: str?
  cloudflare_tunnel_token: password?
  webboxes:
    - name: str
      host: str
      password: password?
      installer_password: password?
      poll_interval: int(30,3600)?
      public_url: url?
      modbus_port: int(1,65535)?
      modbus_unit_id: int(1,247)?
      modbus_enabled: bool?
